name: 检查脚本语法

on:
  push:
    branches: [main]
    paths:
      - "**.ps1"
      - "**.sh"
  pull_request:
    branches: [main]
    paths:
      - "**.ps1"
      - "**.sh"

jobs:
  shellcheck:
    name: ShellCheck（Shell 脚本）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./setup:./scripts"

  pwsh-analysis:
    name: PSScriptAnalyzer（PowerShell 脚本）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force
      - name: 分析 PowerShell 脚本
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./setup -Recurse -Severity Error
          $results += Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Error
          if ($results.Count -gt 0) {
            $results | Format-Table
            exit 1
          }
          Write-Host "✅ 所有 PowerShell 脚本语法检查通过"
